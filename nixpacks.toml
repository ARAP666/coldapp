# Nixpacks configuration for Railway / Render / similar.
# The repo is a monorepo with both server/ and app/. Railway needs to
# know to build and run the Node server only.
#
# Root directory of the source to build. All commands run from here.
root = "server"

# Build phases. Override the defaults so we don't try to run the
# React Native / Expo app as a Node service.
[phases.setup]
aptPkgs = ["nodejs-18"]

[phases.install]
cmds = ["npm ci --omit=dev || npm install --omit=dev"]

[phases.build]
cmds = ["echo 'no build step for the server'"]

[start]
cmd = "node index.js"
